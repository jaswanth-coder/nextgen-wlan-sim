simulation:
  duration_us: 1000000
  seed: 99

network:
  mode: ip

phy:
  backend: tgbe
  channel_model: E

nodes:
  - id: ap0
    type: ap
    links: [2g, 5g, 6g]
    mlo_mode: str
    position: [0.0, 0.0]
  - id: ap1
    type: ap
    links: [2g, 5g, 6g]
    mlo_mode: str
    position: [20.0, 0.0]
  - id: sta0
    type: sta
    links: [5g, 6g]
    mlo_mode: emlmr
    emlmr_n_radios: 2
    position: [5.0, 3.0]
  - id: sta1
    type: sta
    links: [5g, 6g]
    mlo_mode: emlmr
    emlmr_n_radios: 2
    position: [15.0, 3.0]
  - id: sta2
    type: sta
    links: [2g, 5g]
    mlo_mode: str
    position: [10.0, 0.0]

traffic:
  - src: sta0
    dst: ap0
    type: udp_cbr
    rate_mbps: 500
    ac: BE
  - src: sta1
    dst: ap1
    type: video
    rate_mbps: 100
    ac: VI
  - src: sta2
    dst: ap0
    type: poisson
    rate_mbps: 200
    ac: BE

obs:
  log: true
  csv: true
  pcap: true
  viz: false
  output_dir: results/mlo_emlmr_multiap
