# EMLSR vs STR Comparison Scenario
# AP0 serves both EMLSR and STR STAs simultaneously.
# Useful for comparing throughput/latency between MLO modes under the same load.
#
# sta_str:  2-link STR — both links always available
# sta_emlsr: 2-link EMLSR — single radio, switches on trigger
# sta_emlmr: 2-link EMLMR — 2 radios, policy-driven

simulation:
  duration_us: 1000000
  seed: 55

network:
  mode: bss

phy:
  backend: tgbe
  channel_model: D

nodes:
  - id: ap0
    type: ap
    links: [5g, 6g]
    mlo_mode: str
    position: [0.0, 0.0]

  - id: sta_str
    type: sta
    links: [5g, 6g]
    mlo_mode: str
    position: [5.0, 0.0]

  - id: sta_emlsr
    type: sta
    links: [5g, 6g]
    mlo_mode: emlsr
    emlsr_transition_delay_us: 64
    position: [0.0, 5.0]

  - id: sta_emlmr
    type: sta
    links: [5g, 6g]
    mlo_mode: emlmr
    emlmr_n_radios: 2
    position: [-5.0, 0.0]

traffic:
  - src: sta_str
    dst: ap0
    type: udp_cbr
    rate_mbps: 400
    ac: BE

  - src: sta_emlsr
    dst: ap0
    type: udp_cbr
    rate_mbps: 400
    ac: BE

  - src: sta_emlmr
    dst: ap0
    type: udp_cbr
    rate_mbps: 400
    ac: BE

obs:
  log: true
  csv: true
  pcap: false
  viz: true
  output_dir: results/emlsr_vs_str
